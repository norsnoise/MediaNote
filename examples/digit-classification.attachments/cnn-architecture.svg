<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240">
  <rect width="720" height="240" fill="#fafafa"/>
  <!-- input -->
  <g transform="translate(20,90)">
    <rect width="56" height="56" fill="#111" stroke="#444"/>
    <text x="28" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#f4f4f4">7</text>
    <text x="28" y="74" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">1×28×28</text>
  </g>
  <!-- arrow -->
  <path d="M82,118 L108,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="95" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">conv 3×3</text>
  <!-- conv1 -->
  <g transform="translate(112,80)">
    <g fill="#cfe1ff" stroke="#3366cc">
      <rect x="0" y="0" width="44" height="44"/>
      <rect x="4" y="4" width="44" height="44"/>
      <rect x="8" y="8" width="44" height="44"/>
      <rect x="12" y="12" width="44" height="44"/>
    </g>
    <text x="28" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">32×26×26</text>
    <text x="28" y="-6" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">ReLU</text>
  </g>
  <!-- arrow -->
  <path d="M180,118 L210,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="195" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">maxpool 2×2</text>
  <!-- pool1 -->
  <g transform="translate(214,90)">
    <g fill="#cfe1ff" stroke="#3366cc">
      <rect x="0" y="0" width="32" height="32"/>
      <rect x="3" y="3" width="32" height="32"/>
      <rect x="6" y="6" width="32" height="32"/>
      <rect x="9" y="9" width="32" height="32"/>
    </g>
    <text x="22" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">32×13×13</text>
  </g>
  <!-- arrow -->
  <path d="M270,118 L298,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="284" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">conv 3×3</text>
  <!-- conv2 -->
  <g transform="translate(302,90)">
    <g fill="#bfe1bf" stroke="#3a8a3a">
      <rect x="0" y="0" width="30" height="30"/>
      <rect x="3" y="3" width="30" height="30"/>
      <rect x="6" y="6" width="30" height="30"/>
      <rect x="9" y="9" width="30" height="30"/>
      <rect x="12" y="12" width="30" height="30"/>
    </g>
    <text x="22" y="64" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">64×11×11</text>
    <text x="22" y="-6" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">ReLU</text>
  </g>
  <!-- arrow -->
  <path d="M358,118 L388,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="373" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">maxpool 2×2</text>
  <!-- pool2 -->
  <g transform="translate(392,98)">
    <g fill="#bfe1bf" stroke="#3a8a3a">
      <rect x="0" y="0" width="22" height="22"/>
      <rect x="3" y="3" width="22" height="22"/>
      <rect x="6" y="6" width="22" height="22"/>
      <rect x="9" y="9" width="22" height="22"/>
      <rect x="12" y="12" width="22" height="22"/>
    </g>
    <text x="20" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">64×5×5</text>
  </g>
  <!-- arrow -->
  <path d="M440,118 L478,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="459" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">flatten</text>
  <!-- fc1 -->
  <g transform="translate(482,76)">
    <rect width="14" height="84" fill="#ffd28a" stroke="#d35400"/>
    <text x="7" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">FC 128</text>
    <text x="7" y="-6" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">ReLU</text>
  </g>
  <!-- arrow -->
  <path d="M500,118 L538,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="519" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">FC</text>
  <!-- output -->
  <g transform="translate(542,90)">
    <rect width="14" height="56" fill="#ffd28a" stroke="#d35400"/>
    <text x="7" y="74" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">10 logits</text>
  </g>
  <!-- arrow -->
  <path d="M560,118 L596,118" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="578" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">softmax</text>
  <!-- prediction -->
  <g transform="translate(600,86)">
    <rect width="100" height="64" fill="#fff" stroke="#666"/>
    <text x="50" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#444">p(y|x)</text>
    <g font-family="sans-serif" font-size="8" fill="#222">
      <text x="10" y="34">7:</text><rect x="22" y="29" width="56" height="5" fill="#3a8a3a"/>
      <text x="10" y="44">1:</text><rect x="22" y="39" width="10" height="5" fill="#888"/>
      <text x="10" y="54">9:</text><rect x="22" y="49" width="6" height="5" fill="#888"/>
    </g>
  </g>
  <!-- arrowhead defs -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="360" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">LeNet-style CNN: two conv+pool blocks → fully connected → softmax over 10 classes</text>
</svg>

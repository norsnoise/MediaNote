<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180">
  <!-- book body -->
  <rect x="8" y="6" width="124" height="168" rx="4" fill="#f4ead5" stroke="#3a5a2a" stroke-width="2"/>
  <!-- top + bottom bands -->
  <rect x="8" y="6" width="124" height="14" fill="#3a5a2a"/>
  <rect x="8" y="160" width="124" height="14" fill="#3a5a2a"/>
  <!-- spine highlight -->
  <rect x="8" y="6" width="6" height="168" fill="#243a18"/>
  <!-- cartoon toolbelt: hammer + wrench crossed -->
  <g transform="translate(70,72)">
    <!-- hammer -->
    <g transform="rotate(-25)">
      <rect x="-3" y="-4" width="6" height="40" fill="#a06a3a" stroke="#243a18" stroke-width="1.2"/>
      <rect x="-14" y="-18" width="28" height="14" rx="2" fill="#888" stroke="#243a18" stroke-width="1.2"/>
      <rect x="10" y="-16" width="6" height="10" fill="#666" stroke="#243a18" stroke-width="1.2"/>
    </g>
    <!-- wrench -->
    <g transform="rotate(35)">
      <rect x="-3" y="-2" width="6" height="44" fill="#bfc7c9" stroke="#243a18" stroke-width="1.2"/>
      <path d="M-8 -10 L8 -10 L8 -2 L4 -2 L4 -6 L-4 -6 L-4 -2 L-8 -2 Z" fill="#bfc7c9" stroke="#243a18" stroke-width="1.2"/>
      <circle cx="0" cy="42" r="5" fill="#bfc7c9" stroke="#243a18" stroke-width="1.2"/>
      <circle cx="0" cy="42" r="2" fill="#3a5a2a"/>
    </g>
  </g>
  <!-- title bands -->
  <text x="70" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#f4ead5">THE PRAGMATIC PROGRAMMER</text>
  <text x="70" y="170" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#f4ead5">Hunt &amp; Thomas</text>
  <!-- subtitle -->
  <text x="70" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#3a5a2a">From journeyman to master</text>
  <!-- check mark -->
  <g transform="translate(110,148)">
    <circle cx="0" cy="0" r="9" fill="#3a8a3a" stroke="#243a18" stroke-width="1.2"/>
    <path d="M-4 0 L-1 3 L4 -3" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

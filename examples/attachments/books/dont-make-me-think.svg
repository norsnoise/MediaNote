<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180">
  <!-- book body -->
  <rect x="8" y="6" width="124" height="168" rx="4" fill="#ffd24a" stroke="#7a5500" stroke-width="2"/>
  <!-- spine highlight -->
  <rect x="8" y="6" width="6" height="168" fill="#c89a1f"/>
  <!-- cartoon head outline -->
  <g transform="translate(70,80)">
    <!-- head -->
    <circle cx="0" cy="0" r="34" fill="#fff4c2" stroke="#7a5500" stroke-width="2"/>
    <!-- eyes -->
    <circle cx="-12" cy="-6" r="3" fill="#7a5500"/>
    <circle cx="12" cy="-6" r="3" fill="#7a5500"/>
    <!-- furrowed brow -->
    <path d="M-20 -16 L-6 -14 M6 -14 L20 -16" stroke="#7a5500" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- straight confused mouth -->
    <line x1="-8" y1="12" x2="8" y2="12" stroke="#7a5500" stroke-width="2" stroke-linecap="round"/>
    <!-- giant question mark above -->
    <text x="0" y="-30" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#d22d2d">?</text>
  </g>
  <!-- title -->
  <text x="70" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7a1f1f">DON'T MAKE</text>
  <text x="70" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7a1f1f">ME THINK</text>
  <!-- author -->
  <text x="70" y="168" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7a5500">Steve Krug</text>
</svg>

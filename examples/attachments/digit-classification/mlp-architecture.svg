<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <rect width="600" height="320" fill="#fafafa"/>
  <!-- Input image -->
  <g transform="translate(30,110)">
    <rect width="80" height="80" fill="#111" stroke="#444"/>
    <text x="40" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#f4f4f4">3</text>
    <text x="40" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">28×28 image</text>
    <text x="40" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">x ∈ ℝ⁷⁸⁴</text>
  </g>
  <!-- Hidden layer 1 -->
  <g transform="translate(220,40)">
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Hidden h¹ (128)</text>
    <g fill="#9ec5fe" stroke="#3366cc" stroke-width="1">
      <circle cx="0" cy="20" r="10"/>
      <circle cx="0" cy="50" r="10"/>
      <circle cx="0" cy="80" r="10"/>
      <circle cx="0" cy="110" r="10"/>
      <circle cx="0" cy="180" r="10"/>
      <circle cx="0" cy="210" r="10"/>
      <circle cx="0" cy="240" r="10"/>
    </g>
    <text x="0" y="148" text-anchor="middle" font-family="serif" font-size="14" fill="#555">⋮</text>
    <text x="0" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">ReLU</text>
  </g>
  <!-- Hidden layer 2 -->
  <g transform="translate(360,60)">
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Hidden h² (64)</text>
    <g fill="#bfe1bf" stroke="#3a8a3a" stroke-width="1">
      <circle cx="0" cy="20" r="10"/>
      <circle cx="0" cy="50" r="10"/>
      <circle cx="0" cy="80" r="10"/>
      <circle cx="0" cy="150" r="10"/>
      <circle cx="0" cy="180" r="10"/>
      <circle cx="0" cy="210" r="10"/>
    </g>
    <text x="0" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#555">⋮</text>
    <text x="0" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">ReLU</text>
  </g>
  <!-- Output layer -->
  <g transform="translate(500,60)">
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Output (10)</text>
    <g fill="#ffd28a" stroke="#d35400" stroke-width="1">
      <circle cx="0" cy="20" r="10"/>
      <circle cx="0" cy="45" r="10"/>
      <circle cx="0" cy="70" r="10"/>
      <circle cx="0" cy="95" r="10"/>
      <circle cx="0" cy="120" r="10"/>
      <circle cx="0" cy="145" r="10"/>
      <circle cx="0" cy="170" r="10"/>
      <circle cx="0" cy="195" r="10"/>
      <circle cx="0" cy="220" r="10"/>
      <circle cx="0" cy="245" r="10"/>
    </g>
    <g font-family="sans-serif" font-size="9" fill="#444">
      <text x="18" y="23">0</text>
      <text x="18" y="48">1</text>
      <text x="18" y="73">2</text>
      <text x="18" y="98">3</text>
      <text x="18" y="123">4</text>
      <text x="18" y="148">5</text>
      <text x="18" y="173">6</text>
      <text x="18" y="198">7</text>
      <text x="18" y="223">8</text>
      <text x="18" y="248">9</text>
    </g>
    <text x="0" y="275" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">softmax</text>
  </g>
  <!-- Arrows between layers (sample connections) -->
  <g stroke="#aaa" stroke-width="0.6" fill="none" opacity="0.6">
    <!-- input → h1 -->
    <line x1="110" y1="150" x2="210" y2="60"/>
    <line x1="110" y1="150" x2="210" y2="90"/>
    <line x1="110" y1="150" x2="210" y2="120"/>
    <line x1="110" y1="150" x2="210" y2="150"/>
    <line x1="110" y1="150" x2="210" y2="220"/>
    <line x1="110" y1="150" x2="210" y2="250"/>
    <!-- h1 → h2 -->
    <line x1="230" y1="60" x2="350" y2="80"/>
    <line x1="230" y1="90" x2="350" y2="110"/>
    <line x1="230" y1="150" x2="350" y2="140"/>
    <line x1="230" y1="220" x2="350" y2="210"/>
    <line x1="230" y1="250" x2="350" y2="240"/>
    <!-- h2 → out -->
    <line x1="370" y1="80" x2="490" y2="80"/>
    <line x1="370" y1="140" x2="490" y2="160"/>
    <line x1="370" y1="210" x2="490" y2="220"/>
    <line x1="370" y1="240" x2="490" y2="280"/>
  </g>
  <!-- weight matrices labels -->
  <g font-family="serif" font-size="11" fill="#555">
    <text x="170" y="280" text-anchor="middle">W¹ : 784×128</text>
    <text x="295" y="280" text-anchor="middle">W² : 128×64</text>
    <text x="435" y="280" text-anchor="middle">W³ : 64×10</text>
  </g>
</svg>

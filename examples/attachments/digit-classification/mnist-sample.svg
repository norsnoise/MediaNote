<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140">
  <rect width="560" height="140" fill="#fafafa"/>
  <!-- 10 small digit tiles, each 48x48, with a black background and a stylized white digit -->
  <g font-family="Georgia, serif" font-size="40" font-weight="bold" text-anchor="middle">
    <!-- 0 -->
    <g transform="translate(20,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">0</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">0</text>
    </g>
    <!-- 1 -->
    <g transform="translate(72,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="22" y="36" fill="#f4f4f4">1</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">1</text>
    </g>
    <!-- 2 -->
    <g transform="translate(124,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">2</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">2</text>
    </g>
    <!-- 3 -->
    <g transform="translate(176,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">3</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">3</text>
    </g>
    <!-- 4 -->
    <g transform="translate(228,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">4</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">4</text>
    </g>
    <!-- 5 -->
    <g transform="translate(280,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">5</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">5</text>
    </g>
    <!-- 6 -->
    <g transform="translate(332,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">6</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">6</text>
    </g>
    <!-- 7 -->
    <g transform="translate(384,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">7</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">7</text>
    </g>
    <!-- 8 -->
    <g transform="translate(436,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">8</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">8</text>
    </g>
    <!-- 9 -->
    <g transform="translate(488,30)">
      <rect width="48" height="48" fill="#111"/>
      <text x="24" y="36" fill="#f4f4f4">9</text>
      <text x="24" y="68" font-family="sans-serif" font-size="10" font-weight="normal" fill="#444">9</text>
    </g>
  </g>
  <text x="280" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Ten classes — 28×28 grayscale tiles, one row per class</text>
  <text x="280" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">label</text>
  <text x="280" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">stylized for illustration; real MNIST digits are handwritten</text>
</svg>

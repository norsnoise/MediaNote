<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180">
  <!-- book body -->
  <rect x="8" y="6" width="124" height="168" rx="4" fill="#2b4a7a" stroke="#0e2240" stroke-width="2"/>
  <!-- spine highlight -->
  <rect x="8" y="6" width="6" height="168" fill="#1d3458"/>
  <!-- inner panel -->
  <rect x="22" y="22" width="100" height="100" fill="#f4ead5" stroke="#0e2240" stroke-width="1.5"/>
  <!-- nested squares illustration: complexity vs. simplicity -->
  <rect x="36" y="38" width="72" height="68" fill="none" stroke="#d35400" stroke-width="2"/>
  <rect x="46" y="48" width="52" height="48" fill="none" stroke="#d35400" stroke-width="2"/>
  <rect x="56" y="58" width="32" height="28" fill="#ffd28a" stroke="#d35400" stroke-width="2"/>
  <circle cx="72" cy="72" r="4" fill="#0e2240"/>
  <!-- title -->
  <text x="70" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#f4ead5">A PHILOSOPHY OF</text>
  <text x="70" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#f4ead5">SOFTWARE DESIGN</text>
  <!-- author -->
  <text x="70" y="168" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#ffd28a">John Ousterhout</text>
</svg>

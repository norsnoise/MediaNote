<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180">
  <!-- book body -->
  <rect x="8" y="6" width="124" height="168" rx="4" fill="#e8e1d3" stroke="#222" stroke-width="2"/>
  <!-- spine highlight -->
  <rect x="8" y="6" width="6" height="168" fill="#c5beb0"/>
  <!-- two pencils crossing: fast (sharp/red) and slow (rounded/blue) -->
  <g transform="translate(70,72)">
    <!-- fast pencil (diagonal, with motion lines) -->
    <g transform="rotate(-30)">
      <rect x="-32" y="-4" width="48" height="8" fill="#d24545" stroke="#222" stroke-width="1.2"/>
      <polygon points="16,-4 26,0 16,4" fill="#f1c27d" stroke="#222" stroke-width="1.2"/>
      <polygon points="22,-2 26,0 22,2" fill="#222"/>
      <rect x="-38" y="-4" width="6" height="8" fill="#f5a3a3" stroke="#222" stroke-width="1.2"/>
      <!-- motion lines -->
      <line x1="-46" y1="-6" x2="-40" y2="-6" stroke="#d24545" stroke-width="1.5"/>
      <line x1="-46" y1="0" x2="-40" y2="0" stroke="#d24545" stroke-width="1.5"/>
      <line x1="-46" y1="6" x2="-40" y2="6" stroke="#d24545" stroke-width="1.5"/>
    </g>
    <!-- slow pencil (more horizontal, blue, with snail) -->
    <g transform="translate(0,22) rotate(8)">
      <rect x="-32" y="-4" width="48" height="8" fill="#3a6fb8" stroke="#222" stroke-width="1.2"/>
      <polygon points="16,-4 26,0 16,4" fill="#f1c27d" stroke="#222" stroke-width="1.2"/>
      <polygon points="22,-2 26,0 22,2" fill="#222"/>
      <rect x="-38" y="-4" width="6" height="8" fill="#9fb8da" stroke="#222" stroke-width="1.2"/>
    </g>
    <!-- snail riding the slow pencil -->
    <g transform="translate(-6,16)">
      <ellipse cx="0" cy="0" rx="6" ry="3" fill="#a3c08a" stroke="#222" stroke-width="1"/>
      <circle cx="-1" cy="-2" r="4" fill="#d2b380" stroke="#222" stroke-width="1"/>
      <circle cx="-3" cy="-2" r="1.6" fill="none" stroke="#222" stroke-width="1"/>
      <line x1="4" y1="-2" x2="6" y2="-5" stroke="#222" stroke-width="0.8"/>
      <line x1="5" y1="-2" x2="7" y2="-5" stroke="#222" stroke-width="0.8"/>
    </g>
  </g>
  <!-- title -->
  <text x="70" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#222">THINKING,</text>
  <text x="70" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#d24545">FAST</text>
  <text x="70" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#222">              </text>
  <text x="70" y="156" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#3a6fb8">and SLOW</text>
  <!-- author -->
  <text x="70" y="170" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#222">Daniel Kahneman</text>
</svg>
